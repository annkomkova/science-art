<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swiper с кристаллом</title>

    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"
    />

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        font-family: Arial, sans-serif;
        color: white;
      }
      .container {
        display: flex;
        width: 800px;
        height: 400px;
        background: #222;
        border-radius: 12px;
        overflow: hidden;
      }
      /* Слайдер слева */
      .swiper {
        width: 600px;
        height: 100%;
      }
      .swiper-slide {
        font-size: 24px;
        color: #222;
        background: #eee;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Блок с кристаллом справа */
      .crystal-container {
        width: 200px;
        height: 100%;
        background: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Спрайт кристалла */
      .crystal {
        width: 100px;
        height: 100px;
        background-image: url('https://i.imgur.com/kPJ7A3c.png'); /* пример спрайта */
        background-repeat: no-repeat;
        background-position: 0 0;
        background-size: 500% 100%; /* 5 кадров по горизонтали */
        transition: background-position 0.6s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Слайдер -->
      <div class="swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">Слайд 1</div>
          <div class="swiper-slide">Слайд 2</div>
          <div class="swiper-slide">Слайд 3</div>
          <div class="swiper-slide">Слайд 4</div>
          <div class="swiper-slide">Слайд 5</div>
        </div>
        <!-- Если нужны стрелки -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
      </div>

      <!-- Фиксированный кристалл справа -->
      <div class="crystal-container">
        <div class="crystal"></div>
      </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    <script>
      const crystal = document.querySelector('.crystal')
      const totalFrames = 5 // число кадров в спрайте

      // Инициализация Swiper
      const swiper = new Swiper('.swiper', {
        slidesPerView: 1,
        navigation: {
          nextEl: '.swiper-button-next',
          prevEl: '.swiper-button-prev'
        },
        on: {
          slideChange: () => {
            const index = swiper.realIndex % totalFrames // выбираем кадр по индексу слайда
            const posX = -(index * 100) / (totalFrames - 1) // позиция в процентах
            // Меняем позицию спрайта с анимацией
            crystal.style.backgroundPosition = `${posX}% 0`
          }
        }
      })

      // При загрузке выставим начальный кадр
      crystal.style.backgroundPosition = '0% 0'
    </script>
  </body>
</html>
