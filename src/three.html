<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Лекции</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <div class="slide-content">
            <h2>Лекция 1</h2>
            <ul>
              <li>Задачи такие и сякие</li>
              <li>Крутая и классная</li>
              <li>Неописуемо интересная</li>
            </ul>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="slide-content">
            <h2>Лекция 2</h2>
            <ul>
              <li>Про мэппинг</li>
              <li>Про тачдезигн</li>
              <li>С кучей интерактива</li>
            </ul>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="slide-content">
            <h2>Лекция 3</h2>
            <p>Питон питонистый</p>
          </div>
        </div>
      </div>

      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>

    <div class="crystal-3d" aria-hidden="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/loaders/RGBELoader.js"></script>

    <script src="main.js"></script>
  </body>
</html>
